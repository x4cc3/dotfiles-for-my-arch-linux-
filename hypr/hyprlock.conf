# Hyprlock — Oxocarbon theme

background {
    monitor =
    path = /home/xacce/Pictures/wallhaven-3l5mk3_2560x1440.png

    blur_passes = 2
    blur_size = 4

    color = rgba(22, 22, 22, 0.45)
}

# Time
label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"

    color = rgba(242, 244, 248, 0.95)
    font_size = 72
    font_family = JetBrainsMono Nerd Font

    position = 0, 40
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] date +"%a, %d %b"

    color = rgba(120, 169, 255, 0.85)
    font_size = 18
    font_family = JetBrainsMono Nerd Font

    position = 0, -30
    halign = center
    valign = center
}

# Password field
input-field {
    monitor =

    size = 320, 48
    position = 0, -120

    rounding = 8
    outline_thickness = 2

    inner_color = rgba(22, 22, 22, 0.5)
    outer_color = rgba(120, 169, 255, 0.4)

    font_color = rgba(242, 244, 248, 0.9)
    font_family = JetBrainsMono Nerd Font

    placeholder_text = "Password"

    dots_center = true
    dots_size = 0.25
    dots_spacing = 0.22

    fail_color = rgba(238, 83, 150, 0.9)
    fail_text = <span foreground="#ee5396">Wrong password</span>
}
