# Minimal Hyprlock config (JetBrainsMono Nerd Font)

background {
    monitor =
    path = /home/xacce/Pictures/wallhaven-3l5mk3_2560x1440.png

    # subtle blur aesthetic
    blur_passes = 2
    blur_size = 4

    # gentle dim for readability
    color = rgba(0, 0, 0, 0.35)
}

# Time
label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"

    color = rgba(245, 240, 225, 0.95)
    font_size = 72
    font_family = JetBrainsMono Nerd Font

    position = 0, 40
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] date +"%a, %d %b"

    color = rgba(245, 240, 225, 0.75)
    font_size = 18
    font_family = JetBrainsMono Nerd Font

    position = 0, -30
    halign = center
    valign = center
}

# Password field
input-field {
    monitor =

    size = 320, 48
    position = 0, -120

    rounding = 10
    outline_thickness = 2

    inner_color = rgba(0, 0, 0, 0.35)
    outer_color = rgba(245, 240, 225, 0.35)

    font_color = rgba(245, 240, 225, 0.9)
    font_family = JetBrainsMono Nerd Font

    placeholder_text = "Password"

    dots_center = true
    dots_size = 0.25
    dots_spacing = 0.22

    # minimal feedback
    fail_color = rgba(210, 70, 70, 0.9)
    fail_text = <span foreground="#d24646">Wrong password</span>
}
