# Hyprlock — Oxocarbon minimal

background {
    monitor =
    path = /home/xacce/Pictures/rene-bohmer-YeUVDKZWSZ4-unsplash.jpg
    blur_passes = 3
    blur_size = 8
    brightness = 0.6
    contrast = 0.9
    vibrancy = 0.1
    color = rgba(22,22,22,0.45)
}

# Time
label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgba(242,244,248,0.9)
    font_size = 96
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    color = rgba(242,244,248,0.45)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, 10
    halign = center
    valign = center
}

# Input
input-field {
    monitor =
    size = 240, 40
    position = 0, -100
    rounding = 20
    outline_thickness = 0
    inner_color = rgba(242,244,248,0.08)
    outer_color = rgba(242,244,248,0.0)
    font_color = rgba(242,244,248,0.8)
    font_family = JetBrainsMono Nerd Font
    fade_on_empty = true
    fade_timeout = 3000
    placeholder_text = Pass your word bro.
    hide_input = false
    dots_center = true
    dots_size = 0.2
    dots_spacing = 0.3
    dots_rounding = -1
    check_color = rgba(66,190,101,0.6)
    fail_color = rgba(238,83,150,0.7)
    fail_text = <span foreground="#ee5396">✗</span>
    capslock_color = rgba(255,200,50,0.6)
}
