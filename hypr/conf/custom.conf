# Add your additional Hyprland configurations here
#
# This is an additional key binding
# bind = $mainMod CTRL, up, workspace, empty
#
# Example for xwayland
# xwayland {
#   force_zero_scaling = true
# }

permission = /usr/sbin/hyprpm, plugin, allow

# Route plugin dispatchers through hyprctl so config parsing does not fail
# before HyprPM-managed plugins are available to the dispatcher registry.
bind = SUPER, TAB, exec, hyprctl dispatch hymission:toggle
bind = SUPER SHIFT, TAB, exec, hyprctl dispatch hymission:open
bind = SUPER CTRL, TAB, exec, hyprctl dispatch hymission:close

plugin {
    hymission {
        toggle_switch_mode = 1
        switch_toggle_auto_next = 1
        switch_release_key = Super_L
    }
}
