animations {
    enabled = yes

    # Ease-out bezier (fast start, gentle end)
    bezier = snappy, 0.1, 0.9, 0.2, 1.0

    # 1 = 100ms
    animation = windows, 1, 1, snappy, popin
    animation = windowsOut, 1, 1, snappy, slide
    animation = windowsMove, 1, 1, snappy
    animation = border, 1, 1, snappy
    animation = fade, 1, 1, snappy
    animation = workspaces, 1, 1, snappy, slidefade
}
